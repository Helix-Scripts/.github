name: NUI Build

on:
  workflow_call:

jobs:
  build:
    name: Lint & Build NUI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        continue-on-error: false
        run: npx eslint .

      - name: Build
        continue-on-error: false
        run: npm run build
