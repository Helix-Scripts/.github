name: Release Package

on:
  workflow_call:

jobs:
  package:
    name: Package & Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get resource name
        id: meta
        run: echo "name=$(basename ${{ github.repository }})" >> "$GITHUB_OUTPUT"

      - name: Package resource
        run: |
          mkdir -p /tmp/release/${{ steps.meta.outputs.name }}
          rsync -a \
            --include='README.md' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='nui' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='selene' \
            --exclude='docs' \
            --exclude='*.test.lua' \
            --exclude='*.spec.lua' \
            --exclude='*.md' \
            --exclude='.luacheckrc' \
            --exclude='.luarc.json' \
            --exclude='.stylua.toml' \
            --exclude='selene.toml' \
            --exclude='fivem.yml' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tsconfig.json' \
            --exclude='tsconfig.*.json' \
            --exclude='vite.config.*' \
            --exclude='postcss.config.*' \
            --exclude='tailwind.config.*' \
            --exclude='.eslintrc*' \
            --exclude='eslint.config.*' \
            --exclude='.prettierrc*' \
            --exclude='test.sh' \
            --exclude='preview.png' \
            ./ /tmp/release/${{ steps.meta.outputs.name }}/
          cd /tmp/release
          zip -r /tmp/${{ steps.meta.outputs.name }}.zip ${{ steps.meta.outputs.name }}/

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "/tmp/${{ steps.meta.outputs.name }}.zip" --clobber

      - name: Upload artifact (manual run)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: /tmp/${{ steps.meta.outputs.name }}.zip
