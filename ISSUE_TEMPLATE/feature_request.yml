name: Feature Request
description: Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: script
    attributes:
      label: Script
      description: Which Helix script is this about?
      options:
        - helix_lib
        - helix_hud
        - helix_npc
        - helix_economy
        - helix_crafting
        - helix_dispatch
        - helix_devtools
        - helix_missions
        - New script idea
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your assessment)
      options:
        - Nice to have
        - Important
        - Critical for my server
